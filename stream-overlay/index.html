<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QL Tournament Stream Overlay</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="overlay-root">
      <img id="tournament-logo" class="logo hidden" alt="" />

      <div id="match-popup" class="popup hidden" aria-live="polite">
        <div class="popup-inner">
          <p id="popup-tournament" class="popup-tournament"></p>
          <h2 id="popup-title" class="popup-title">Live match</h2>
          <p id="popup-meta" class="popup-meta"></p>
          <p id="popup-connect" class="popup-connect hidden"></p>
          <ul id="popup-players" class="popup-players"></ul>
        </div>
      </div>

      <div id="status" class="status hidden" role="status"></div>

      <button id="edit-settings" type="button" class="edit-settings hidden">
        Edit settings
      </button>

      <div id="setup-panel" class="setup-panel hidden" aria-labelledby="setup-title">
        <form id="setup-form" class="setup-form">
          <h2 id="setup-title" class="setup-title">Overlay settings</h2>
          <p class="setup-hint">
            Saved in this browser (localStorage). Live scores via WebSocket to ql-stats-hub when configured;
            tournament meta/logos from ql-public-data CDN — no Hub URL or token.
            <a href="docs.html" target="_blank" rel="noopener">Documentation</a>
          </p>
          <label class="setup-field">
            <span>Public data base (CDN)</span>
            <input
              name="publicDataBase"
              type="url"
              required
              placeholder="https://cdn.jsdelivr.net/gh/owner/ql-public-data@main"
            />
            <span class="setup-field-hint">jsDelivr or raw GitHub base URL for published tournament JSON.</span>
          </label>
          <label class="setup-field">
            <span>Tournament slug</span>
            <input
              name="tournamentSlug"
              type="text"
              required
              placeholder="spring-cup-2026"
              pattern="[a-z0-9]+(?:-[a-z0-9]+)*"
            />
            <span class="setup-field-hint">Same slug as in Hub tournament settings / ql-public-data path.</span>
          </label>
          <label class="setup-field">
            <span>Stats hub URL (WebSocket)</span>
            <input
              name="statsHubBase"
              type="url"
              placeholder="http://stats.example.com:8090"
            />
            <span class="setup-field-hint"
              >Live match scores via WS. /connect hints still from CDN overlay-live (slow refresh).</span
            >
          </label>
          <label class="setup-field">
            <span>CDN fallback poll (ms, 0 = off)</span>
            <input name="pollIntervalMs" type="number" min="0" step="1000" value="30000" />
            <span class="setup-field-hint"
              >Only for /connect and show_popup from overlay-live.json when stats hub WS is active.</span
            >
          </label>
          <label class="setup-field">
            <span>Logo</span>
            <div id="logo-picker" class="logo-picker" aria-live="polite">
              <p class="logo-picker-hint">Logos load from CDN (assets/overlay-logos.json).</p>
            </div>
            <input name="logoId" type="hidden" />
            <input name="logoUrl" type="hidden" />
          </label>
          <label class="setup-field setup-check">
            <input name="showConnect" type="checkbox" checked />
            <span>Show /connect in popup</span>
          </label>
          <label class="setup-field">
            <span>Popup auto-hide (ms, 0 = off)</span>
            <input name="popupAutoHideMs" type="number" min="0" step="1000" value="0" />
          </label>
          <p id="setup-error" class="setup-error hidden" role="alert"></p>
          <div class="setup-actions">
            <button type="submit" class="setup-save">Save &amp; start</button>
          </div>
        </form>
      </div>
    </div>
    <script src="overlay.js"></script>
  </body>
</html>
